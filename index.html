<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TanBerry | Game Art Portfolio</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="hero">
    <h1 class="logo">TB</h1>
    <p class="subtitle">Enter the Realm</p>
    <button onclick="enterRealm()">Start Adventure</button>
  </header>

  <main id="main-content" style="display:none;">
    <section class="gallery">
      <h2>Gallery of Models</h2>
      <div class="tiles">
        <div class="tile" onclick="openModel('model1')">Temple of Concepts</div>
        <div class="tile" onclick="openModel('model2')">Shrine of Renders</div>
        <div class="tile" onclick="openModel('model3')">Artifact Room</div>
      </div>
    </section>

    <section class="about">
      <h2>About the Artist</h2>
      <p>Name: TanBerry</p>
      <ul>
        <li>🎨 Strength: Sculpting</li>
        <li>✨ Magic: Blender FX</li>
        <li>🛡️ Wisdom: Game Aesthetics</li>
      </ul>
    </section>

    <section class="contact">
      <h2>Find the Artist</h2>
      <ul class="social-links">
        <li><a href="#">ArtStation</a></li>
        <li><a href="#">LinkedIn</a></li>
        <li><a href="#">Twitter</a></li>
      </ul>
      <form>
        <label>Email:</label>
        <input type="email" required />
        <label>Message:</label>
        <textarea required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section>

    <footer>
      <p>Made with 💙 by Player 2</p>
    </footer>
  </main>
</body>
</html>
